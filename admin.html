<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUT-SOS | ADMIN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        header {
            border-bottom: 2px solid #000000;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 1.3rem;
            margin: 0;
            text-transform: uppercase;
        }
        select {
            border: 2px solid #000000;
            padding: 5px;
            font-weight: bold;
            background: #ffffff;
            margin-top: 5px;
        }
        .main-layout {
            display: flex;
            gap: 15px;
        }
        .panel-list {
            width: 40%;
        }
        .panel-map {
            width: 60%;
        }
        .list-container {
            height: 520px;
            overflow-y: auto;
            border: 2px solid #000000;
            padding: 10px;
            background: #fafafa;
        }
        .ticket {
            border: 1px solid #000000;
            background: #ffffff;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            position: relative;
        }
        /* Phân biệt màu sắc trạng thái tinh tế */
        .ticket.status-processing {
            border-left: 5px solid #ff3b30; /* Đang giải quyết ưu tiên có vạch đỏ đậm */
            background: #fff9f9;
        }
        .ticket.status-done {
            opacity: 0.5; /* Đã giải quyết sẽ mờ đi */
        }
        .ticket-header {
            font-weight: bold;
            border-bottom: 1px solid #000000;
            padding-bottom: 4px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            padding-right: 20px;
        }
        .btn-action {
            border: 1px solid #000000;
            padding: 4px 8px;
            font-size: 0.8rem;
            background: #ffffff;
            cursor: pointer;
            text-decoration: none;
            color: #000000;
            display: inline-block;
            margin-top: 5px;
        }
        
        /* Menu 3 chấm dọc tối giản */
        .menu-container {
            position: absolute;
            top: 8px;
            right: 8px;
        }
        .dots-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
            line-height: 1;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 20px;
            background: #ffffff;
            border: 1px solid #000000;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            min-width: 130px;
        }
        .dropdown-menu button {
            display: block;
            width: 100%;
            padding: 8px 12px;
            background: none;
            border: none;
            text-align: left;
            font-size: 0.8rem;
            cursor: pointer;
            color: #000000;
        }
        .dropdown-menu button:hover {
            background: #f2f2f7;
        }
        
        #admin-map {
            width: 100%;
            height: 542px;
            border: 2px solid #000000;
        }
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .panel-list, .panel-map { width: 100%; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <h1>DUT-SOS - Điều Phối Trung Tâm</h1>
        <div>
            <label>Khu vực:</label>
            <select id="ward-filter" onchange="filterWard()">
                <option value="all">Tất cả các Phường</option>
                <option value="hkb">Phường Hòa Khánh Bắc</option>
                <option value="hkn">Phường Hòa Khánh Nam</option>
                <option value="ph">Phường Phú Hội</option>
            </select>
        </div>
    </header>

    <div class="main-layout">
        <div class="panel-list">
            <div class="list-container" id="sos-container">
                <p style="text-align: center; font-weight: bold;">Đang tải dữ liệu Realtime...</p>
            </div>
        </div>

        <div class="panel-map">
            <div id="admin-map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDVKwPRvT8n-BE8qLdNjYQ2Axxjtsq173M",
            authDomain: "dut-sos.firebaseapp.com",
            databaseURL: "https://dut-sos-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dut-sos",
            storageBucket: "dut-sos.firebasestorage.app",
            messagingSenderId: "1034895479327",
            appId: "1:1034895479327:web:7aba158f12dcfe19f0bb2a",
            measurementId: "G-F8JTHC5XP9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let adminMap = L.map('admin-map').setView([16.071234, 108.152345], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(adminMap);

        let allTickets = {};
        let mapMarkers = [];

        // Đóng các menu 3 chấm khi click ra ngoài vùng chọn
        window.addEventListener('click', function(e) {
            if (!e.target.matches('.dots-btn')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => menu.style.display = 'none');
            }
        });

        database.ref('dut_sos_tickets').on('value', (snapshot) => {
            allTickets = snapshot.val() || {};
            filterWard(); 
        });

        function toggleMenu(id) {
            const menu = document.getElementById(`menu-${id}`);
            const isDisplayed = menu.style.display === 'block';
            document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
            if (!isDisplayed) menu.style.display = 'block';
            event.stopPropagation();
        }

        // Các hàm xử lý tương tác cập nhật dữ liệu trực tiếp lên Firebase
        function updateStatus(id, statusValue) {
            database.ref(`dut_sos_tickets/${id}`).update({ status: statusValue });
        }

        function deleteTicket(id) {
            if (confirm("Bạn có chắc chắn muốn xóa tin báo cứu hộ này khỏi hệ thống?")) {
                database.ref(`dut_sos_tickets/${id}`).remove();
            }
        }

        function filterWard() {
            const container = document.getElementById("sos-container");
            const selectVal = document.getElementById("ward-filter").value;
            container.innerHTML = "";

            mapMarkers.forEach(marker => adminMap.removeLayer(marker));
            mapMarkers = [];

            let ticketsArray = [];
            for (let id in allTickets) {
                ticketsArray.push({ id: id, ...allTickets[id] });
            }

            // Thuật toán sắp xếp danh sách hàng chờ: 
            // 1. Loại "processing" (Giải quyết ngay) luôn đứng đầu.
            // 2. Tiếp theo đến loại "pending" (Chưa xử lý).
            // 3. Cuối cùng là loại "done" (Đã giải quyết).
            // Trong cùng nhóm trạng thái, tin mới gửi sẽ xếp lên trước.
            ticketsArray.sort((a, b) => {
                const score = { 'processing': 1, 'pending': 2, 'done': 3 };
                const aScore = score[a.status] || 2;
                const bScore = score[b.status] || 2;
                if (aScore !== bScore) return aScore - bScore;
                return b.time.localeCompare(a.time); 
            });

            let count = 0;

            ticketsArray.forEach(ticket => {
                if (selectVal !== "all" && ticket.ward !== selectVal) return;
                count++;

                let wardText = ticket.ward === "hkb" ? "Hòa Khánh Bắc" : (ticket.ward === "hkn" ? "Hòa Khánh Nam" : "Phú Hội");
                let statusClass = ticket.status === "processing" ? "status-processing" : (ticket.status === "done" ? "status-done" : "");
                let statusLabel = ticket.status === "processing" ? " [ĐANG XỬ LÝ]" : (ticket.status === "done" ? " [ĐÃ XỬ LÝ]" : "");

                let ticketHtml = `
                    <div class="ticket ${statusClass}">
                        <div class="menu-container">
                            <button class="dots-btn" onclick="toggleMenu('${ticket.id}')">⋮</button>
                            <div class="dropdown-menu" id="menu-${ticket.id}">
                                <button onclick="updateStatus('${ticket.id}', 'processing')">🔴 Giải quyết ngay</button>
                                <button onclick="updateStatus('${ticket.id}', 'done')">🟢 Đã giải quyết</button>
                                <button onclick="updateStatus('${ticket.id}', 'pending')">⚪ Chờ xử lý</button>
                                <button onclick="deleteTicket('${ticket.id}')" style="color: red; border-top: 1px solid #eee;">❌ Xóa tin</button>
                            </div>
                        </div>
                        <div class="ticket-header">
                            <div>MÃ: ${ticket.id.substring(1, 6).toUpperCase()}${statusLabel}</div>
                            <div>${ticket.time || ''}</div>
                        </div>
                        <p style="margin: 4px 0;"><strong>Khu vực:</strong> Phường ${wardText}</p>
                        <p style="margin: 4px 0;"><strong>Nội dung:</strong> ${ticket.needs.join(", ")}</p>
                        <p style="margin: 4px 0; font-family: monospace;">Tọa độ: ${ticket.lat.toFixed(6)}, ${ticket.lng.toFixed(6)}</p>
                        <div>
                            <button class="btn-action" onclick="focusMarker(${ticket.lat}, ${ticket.lng})">Xem vị trí</button>
                            <a href="https://www.google.com/maps/search/?api=1&query=${ticket.lat},${ticket.lng}" target="_blank" class="btn-action" style="border-color: #34a853;">Google Maps ➔</a>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', ticketHtml);

                // Điểm ghim trên bản đồ: nếu đang ưu tiên xử lý (processing) sẽ đổi màu mốc biểu tượng (nếu tùy biến), mặc định hiển thị popup chi tiết trạng thái
                let marker = L.marker([ticket.lat, ticket.lng]).addTo(adminMap)
                    .bindPopup(`<b>Phường ${wardText} ${statusLabel}</b><br>${ticket.needs.join(", ")}`);
                mapMarkers.push(marker);
            });

            if (count === 0) {
                container.innerHTML = '<p style="text-align: center; padding-top: 10px;">Không có tín hiệu khẩn cấp.</p>';
            }
        }

        function focusMarker(lat, lng) {
            adminMap.setView([lat, lng], 17);
        }
    </script>
</body>
</html>
