<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUT-SOS | BAN ĐIỀU PHỐI PHƯỜNG</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --red: #ff3b30;
            --gray: #e5e5ea;
            --light-gray: #f2f2f7;
        }
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            background: var(--white);
            color: var(--black);
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        header {
            border-bottom: 3px solid var(--black);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: table;
            width: 100%;
        }
        .header-left {
            display: table-cell;
            vertical-align: middle;
        }
        .header-right {
            display: table-cell;
            text-align: right;
            vertical-align: middle;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
        }
        .role-box {
            font-weight: bold;
            font-size: 0.9rem;
        }
        select {
            border: 2px solid var(--black);
            padding: 6px 12px;
            font-weight: bold;
            background: var(--white);
            font-size: 0.9rem;
            margin-left: 8px;
            cursor: pointer;
        }
        .main-layout {
            display: table;
            width: 100%;
            table-layout: fixed;
        }
        .panel-list, .panel-map {
            display: table-cell;
            vertical-align: top;
            border: 2px solid var(--black);
        }
        .panel-list {
            width: 45%;
        }
        .panel-map {
            width: 55%;
            padding-left: 0;
            border-left: none;
        }
        .panel-title {
            background: var(--black);
            color: var(--white);
            padding: 10px 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .list-container {
            height: 550px;
            overflow-y: auto;
            padding: 15px;
            background: var(--light-gray);
        }
        .ticket {
            border: 2px solid var(--black);
            background: var(--white);
            padding: 15px;
            margin-bottom: 12px;
            position: relative;
        }
        .ticket.urgent {
            border-color: var(--red);
            background: #fff5f5;
        }
        .ticket-header {
            display: table;
            width: 100%;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 8px;
            border-bottom: 1px dashed var(--black);
            padding-bottom: 6px;
        }
        .ticket-id {
            display: table-cell;
            text-align: left;
        }
        .ticket-time {
            display: table-cell;
            text-align: right;
            color: var(--red);
        }
        .tag-container {
            margin: 8px 0;
        }
        .tag {
            display: inline-block;
            background: var(--black);
            color: var(--white);
            font-size: 0.75rem;
            padding: 3px 8px;
            font-weight: bold;
            margin-right: 5px;
            text-transform: uppercase;
        }
        .tag.danger {
            background: var(--red);
        }
        .btn-action {
            display: inline-block;
            border: 2px solid var(--black);
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--black);
            background: var(--white);
            text-decoration: none;
            cursor: pointer;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .btn-action:hover {
            background: var(--gray);
        }
        .btn-google {
            border-color: #34a853;
            color: #34a853;
            margin-left: 6px;
        }
        .btn-google:hover {
            background: #e6f4ea;
        }
        #admin-map {
            width: 100%;
            height: 550px;
        }
        @media (max-width: 768px) {
            .panel-list, .panel-map {
                display: block;
                width: 100%;
            }
            .panel-map {
                border-left: 2px solid var(--black);
                border-top: none;
                margin-top: 20px;
            }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="header-left">
            <h1>DUT-SOS 🔴 Trung Tâm Quản Lý Cứu Hộ</h1>
            <p style="margin: 4px 0 0 0; font-size: 0.85rem; color: #555;">Ban chỉ huy: <strong style="color:#000;">Hệ thống trực tuyến</strong></p>
        </div>
        <div class="header-right">
            <div class="role-box">
                <span>Phân quyền Admin:</span>
                <select id="ward-filter" onchange="filterWard()">
                    <option value="all">-- TẤT CẢ CÁC PHƯỜNG --</option>
                    <option value="hkb">Phường Hòa Khánh Bắc</option>
                    <option value="hkn">Phường Hòa Khánh Nam</option>
                    <option value="ph">Phường Phú Hội</option>
                </select>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <div class="panel-list">
            <div class="panel-title">Tín hiệu SOS cần ứng cứu khẩn cấp</div>
            <div class="list-container" id="sos-container">
                <p style="text-align: center; font-weight: bold; padding-top: 20px;">Đang đồng bộ dữ liệu trực tuyến...</p>
            </div>
        </div>

        <div class="panel-map">
            <div class="panel-title">Bản đồ định vị vệ tinh / thực địa (Leaflet API)</div>
            <div id="admin-map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Đã cấu hình chính xác theo tài khoản dự án dut-sos của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyDVKwPRvT8n-BE8qLdNjYQ2Axxjtsq173M",
            authDomain: "dut-sos.firebaseapp.com",
            databaseURL: "https://dut-sos-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dut-sos",
            storageBucket: "dut-sos.firebasestorage.app",
            messagingSenderId: "1034895479327",
            appId: "1:1034895479327:web:7aba158f12dcfe19f0bb2a",
            measurementId: "G-F8JTHC5XP9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Mặc định khởi tạo bản đồ lấy tiêu điểm trung tâm khu vực Đà Nẵng
        let adminMap = L.map('admin-map').setView([16.071234, 108.152345], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(adminMap);

        let allTickets = {};
        let mapMarkers = [];

        // Lắng nghe biến động và đồng bộ dữ liệu Realtime từ Firebase phát về
        database.ref('dut_sos_tickets').on('value', (snapshot) => {
            allTickets = snapshot.val() || {};
            filterWard(); 
        });

        function filterWard() {
            const container = document.getElementById("sos-container");
            const selectVal = document.getElementById("ward-filter").value;
            container.innerHTML = "";

            // Dọn sạch toàn bộ mốc định vị cũ trên giao diện bản đồ trước khi vẽ điểm mới
            mapMarkers.forEach(marker => adminMap.removeLayer(marker));
            mapMarkers = [];

            let count = 0;

            // Vòng lặp quét dữ liệu Realtime đổ ra giao diện
            for (let id in allTickets) {
                let ticket = allTickets[key = id];

                // Bộ lọc phân loại khu vực theo phường
                if (selectVal !== "all" && ticket.ward !== selectVal) continue;
                count++;

                let wardText = "";
                if(ticket.ward === "hkb") wardText = "P. Hòa Khánh Bắc";
                else if(ticket.ward === "hkn") wardText = "P. Hòa Khánh Nam";
                else wardText = "P. Phú Hội";

                // Định dạng thẻ nhu cầu của người dân
                let tagsHtml = ticket.needs.map(need => {
                    let isDanger = need.includes("Cấp cứu") || need.includes("mắc kẹt") || need.includes("Thuốc");
                    return `<span class="tag ${isDanger ? 'danger' : ''}">${need}</span>`;
                }).join("");

                let ticketHtml = `
                    <div class="ticket urgent">
                        <div class="ticket-header">
                            <div class="ticket-id">DUT-SOS #${id.substring(1, 6).toUpperCase()} - ${wardText}</div>
                            <div class="ticket-time">${ticket.time || 'Vừa xong'}</div>
                        </div>
                        <p style="margin: 5px 0; font-size: 0.9rem;"><strong>Người báo:</strong> ${ticket.sender}</p>
                        <div class="tag-container">${tagsHtml}</div>
                        <p style="margin: 5px 0; font-size: 0.85rem;">Mã định vị: <code>${ticket.lat.toFixed(6)}, ${ticket.lng.toFixed(6)}</code></p>
                        <div>
                            <button class="btn-action" onclick="focusMarker(${ticket.lat}, ${ticket.lng})">Định vị trên UI</button>
                            <a href="https://www.google.com/maps?q=${ticket.lat},${ticket.lng}" target="_blank" class="btn-action btn-google">Mở Google Maps ➔</a>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('afterbegin', ticketHtml);

                // Ghim mốc đỏ thời gian thực trực quan lên bản đồ Leaflet Map API
                let marker = L.marker([ticket.lat, ticket.lng]).addTo(adminMap)
                    .bindPopup(`<b>${wardText}</b><br>Nhu cầu: ${ticket.needs.join(", ")}`);
                mapMarkers.push(marker);
            }

            if (count === 0) {
                container.innerHTML = '<p style="text-align: center; padding-top: 20px;">Hiện tại không có tín hiệu khẩn cấp nào cần hỗ trợ.</p>';
            }
        }

        function focusMarker(lat, lng) {
            adminMap.setView([lat, lng], 17);
        }
    </script>
</body>
</html>
