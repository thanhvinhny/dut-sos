<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUT-SOS | KHẨN CẤP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --red: #ff3b30;
            --gray: #f2f2f7;
        }
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            background: var(--white);
            color: var(--black);
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        header {
            border-bottom: 3px solid var(--black);
            padding-bottom: 12px;
            margin-bottom: 25px;
            display: table;
            width: 100%;
        }
        .header-title {
            display: table-cell;
            vertical-align: middle;
        }
        .header-auth {
            display: table-cell;
            text-align: right;
            vertical-align: middle;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .btn-auth {
            padding: 8px 14px;
            border: 2px solid var(--black);
            background: var(--white);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            margin-left: 6px;
            text-transform: uppercase;
        }
        .section-label {
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.95rem;
        }
        .input-box {
            width: 100%;
            border: 2px solid var(--black);
            padding: 14px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--white);
            margin-bottom: 20px;
            resize: vertical;
        }
        .input-box:focus {
            outline: none;
        }
        /* Tối giản và thu nhỏ vừa khung nút Gửi */
        .btn-danger {
            width: 100%;
            background: var(--red);
            color: var(--white);
            border: 2px solid var(--black);
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.1s;
            letter-spacing: 0.5px;
        }
        .btn-danger:active {
            background: #cc2f26;
        }
        #map-preview {
            height: 200px;
            border: 2px solid var(--black);
            margin-top: 25px;
            display: none;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>DUT-SOS 🔴</h1>
        </div>
        <div class="header-auth">
            <button class="btn-auth" onclick="loginZalo()">Zalo</button>
            <button class="btn-auth" onclick="loginGoogle()">Google</button>
        </div>
    </header>

    <main>
        <div class="section-label">Mô tả tình hình hiện tại:</div>
        <textarea id="user-description" class="input-box" rows="4" placeholder="Ví dụ: Nhà hết sạch đồ ăn, nước đang ngập tới thắt lưng, có người già cần thuốc men..."></textarea>

        <button class="btn-danger" onclick="triggerSOS()">Gửi Yêu Cầu</button>

        <div id="map-preview"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDVKwPRvT8n-BE8qLdNjYQ2Axxjtsq173M",
            authDomain: "dut-sos.firebaseapp.com",
            databaseURL: "https://dut-sos-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dut-sos",
            storageBucket: "dut-sos.firebasestorage.app",
            messagingSenderId: "1034895479327",
            appId: "1:1034895479327:web:7aba158f12dcfe19f0bb2a",
            measurementId: "G-F8JTHC5XP9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userCoords = null;
        let map = null;

        // Tọa độ trung tâm hoặc ranh giới tương đối để hệ thống tự động nhận diện phân loại Phường
        const WARD_COORDINATES = {
            hkb: { lat: 16.071234, lng: 108.152345 }, // Hòa Khánh Bắc
            hkn: { lat: 16.060000, lng: 108.140000 }, // Hòa Khánh Nam
            ph:  { lat: 16.463212, lng: 107.595432 }  // Phú Hội
        };

        window.onload = function() {
            getLocation();
        };

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError, {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                });
            }
        }

        function showPosition(position) {
            userCoords = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };
            
            document.getElementById("map-preview").style.display = "block";
            if (!map) {
                map = L.map('map-preview', { zoomControl: false }).setView([userCoords.lat, userCoords.lng], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([userCoords.lat, userCoords.lng]).addTo(map);
            } else {
                map.setView([userCoords.lat, userCoords.lng], 16);
            }
        }

        function showError(error) {
            console.log("GPS Error Code: " + error.code);
        }

        // Hàm tính toán khoảng cách để tự động tìm Phường gần nhất với vị trí thực tế của thiết bị
        function autoCalculateWard(lat, lng) {
            let closestWard = "hkb"; // Giá trị mặc định phòng hờ
            let minDistance = Infinity;

            for (let ward in WARD_COORDINATES) {
                let target = WARD_COORDINATES[ward];
                // Công thức Haversine tính khoảng cách hình học phẳng/cầu cơ bản
                let dist = Math.sqrt(Math.pow(lat - target.lat, 2) + Math.pow(lng - target.lng, 2));
                if (dist < minDistance) {
                    minDistance = dist;
                    closestWard = ward;
                }
            }
            return closestWard;
        }

        function triggerSOS() {
            if (!userCoords) {
                alert("Hệ thống chưa nhận được định vị GPS! Vui lòng bật vị trí của thiết bị và tải lại trang.");
                getLocation();
                return;
            }

            let description = document.getElementById("user-description").value.trim();
            let selectedNeeds = description ? [description] : ["Cần hỗ trợ khẩn cấp (Không có mô tả)"];

            // Hệ thống tự động tính toán địa chỉ phân loại xã phường dựa trên GPS thực tế
            let autoWard = autoCalculateWard(userCoords.lat, userCoords.lng);

            const sosData = {
                lat: userCoords.lat,
                lng: userCoords.lng,
                ward: autoWard, // Tự động điền nhãn phân loại (hkb/hkn/ph)
                needs: selectedNeeds,
                time: new Date().toLocaleTimeString('vi-VN'),
                sender: "Người dân ẩn danh"
            };

            database.ref('dut_sos_tickets').push(sosData)
                .then(() => {
                    alert(`ĐÃ GỬI SOS THÀNH CÔNG!\nHệ thống đã tự động định vị vị trí của bạn và gửi tín hiệu về ban điều phối khu vực.`);
                    document.getElementById("user-description").value = "";
                })
                .catch((error) => {
                    alert("Lỗi kết nối máy chủ: " + error.message);
                });
        }

        function loginGoogle() { alert("Kết nối Google API..."); }
        function loginZalo() { alert("Kết nối Zalo API..."); }
    </script>
</body>
</html>
