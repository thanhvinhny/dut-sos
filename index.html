<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUT-SOS | KHẨN CẤP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --red: #ff3b30;
            --gray: #f2f2f7;
        }
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            background: var(--white);
            color: var(--black);
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        header {
            border-bottom: 3px solid var(--black);
            padding-bottom: 12px;
            margin-bottom: 25px;
            display: table;
            width: 100%;
        }
        .header-title {
            display: table-cell;
            vertical-align: middle;
        }
        .header-auth {
            display: table-cell;
            text-align: right;
            vertical-align: middle;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .btn-auth {
            padding: 8px 14px;
            border: 2px solid var(--black);
            background: var(--white);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            margin-left: 6px;
            text-transform: uppercase;
        }
        .section-label {
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.95rem;
        }
        .input-box {
            width: 100%;
            border: 2px solid var(--black);
            padding: 14px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--white);
            margin-bottom: 20px;
            resize: vertical;
        }
        .input-box:focus {
            outline: none;
        }
        select.input-box {
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        .btn-danger {
            width: 100%;
            background: var(--red);
            color: var(--white);
            border: 3px solid var(--black);
            padding: 22px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 5px 5px 0px var(--black);
            transition: transform 0.05s, box-shadow 0.05s;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .btn-danger:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--black);
        }
        #map-preview {
            height: 200px;
            border: 2px solid var(--black);
            margin-top: 25px;
            display: none;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>DUT-SOS 🔴</h1>
        </div>
        <div class="header-auth">
            <button class="btn-auth" onclick="loginZalo()">Zalo</button>
            <button class="btn-auth" onclick="loginGoogle()">Google</button>
        </div>
    </header>

    <main>
        <div class="section-label">Mô tả tình hình hiện tại:</div>
        <textarea id="user-description" class="input-box" rows="4" placeholder="Ví dụ: Nhà hết sạch đồ ăn, nước đang ngập tới thắt lưng, có người già cần thuốc men..."></textarea>

        <div class="section-label">Khu vực Phường của bạn:</div>
        <select id="user-ward" class="input-box">
            <option value="hkb">Phường Hòa Khánh Bắc</option>
            <option value="hkn">Phường Hòa Khánh Nam</option>
            <option value="ph">Phường Phú Hội</option>
        </select>

        <button class="btn-danger" onclick="triggerSOS()">Gửi Yêu Cầu Cứu Hộ</button>

        <div id="map-preview"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDVKwPRvT8n-BE8qLdNjYQ2Axxjtsq173M",
            authDomain: "dut-sos.firebaseapp.com",
            databaseURL: "https://dut-sos-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dut-sos",
            storageBucket: "dut-sos.firebasestorage.app",
            messagingSenderId: "1034895479327",
            appId: "1:1034895479327:web:7aba158f12dcfe19f0bb2a",
            measurementId: "G-F8JTHC5XP9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userCoords = null;
        let map = null;

        window.onload = function() {
            getLocation();
        };

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError, {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                });
            }
        }

        function showPosition(position) {
            userCoords = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };
            
            // Đã xóa phần innerHTML hiển thị chuỗi văn bản tọa độ ở đây theo yêu cầu
            
            document.getElementById("map-preview").style.display = "block";
            if (!map) {
                map = L.map('map-preview', { zoomControl: false }).setView([userCoords.lat, userCoords.lng], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([userCoords.lat, userCoords.lng]).addTo(map);
            } else {
                map.setView([userCoords.lat, userCoords.lng], 16);
            }
        }

        function showError(error) {
            console.log("GPS Error Code: " + error.code);
        }

        function triggerSOS() {
            if (!userCoords) {
                alert("Hệ thống chưa nhận được tín hiệu định vị GPS! Vui lòng cho phép trình duyệt truy cập vị trí và thử lại.");
                getLocation();
                return;
            }

            // Lấy nội dung người dân tự gõ mô tả
            let description = document.getElementById("user-description").value.trim();
            let selectedNeeds = description ? [description] : ["Cần hỗ trợ khẩn cấp (Không có mô tả)"];

            let ward = document.getElementById("user-ward").value;

            const sosData = {
                lat: userCoords.lat,
                lng: userCoords.lng,
                ward: ward,
                needs: selectedNeeds, 
                time: new Date().toLocaleTimeString('vi-VN'),
                sender: "Người dân ẩn danh"
            };

            database.ref('dut_sos_tickets').push(sosData)
                .then(() => {
                    alert(`ĐÃ GỬI SOS THÀNH CÔNG!\nBan chỉ huy Phường đã tiếp nhận tọa độ thực địa của bạn và đang điều phối lực lượng.`);
                    document.getElementById("user-description").value = ""; // Reset ô nhập
                })
                .catch((error) => {
                    alert("Lỗi đường truyền mạng: " + error.message);
                });
        }

        function loginGoogle() { alert("Kết nối Google API..."); }
        function loginZalo() { alert("Kết nối Zalo API..."); }
    </script>
</body>
</html>
